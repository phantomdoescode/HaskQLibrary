name:                haskell-opac
version:             0.1.0.0
github:              "githubuser/haskell-opac"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2026 Author name here"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md Models.User
description:         Please see the README on GitHub at <https://github.com/githubuser/haskell-opac#readme>

dependencies:
- base >= 4.7 && < 5
# SQlite Database
- sqlite-simple 
# Haskell CLI Interface
- haskeline 
# Text & Formatting
- text
- bytestring
- time 
# App Architecture (Monad)
- mtl
- transformers
# Password Hashing
- bcrypt 

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

executables:
  haskell-opac-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - haskell-opac

tests:
  haskell-opac-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - haskell-opac
